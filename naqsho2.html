<!DOCTYPE html>
<html lang="so" data-wedding-key="naqsho2">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="mobile.css" />
  <title>Naqsho 2 — Jardiino</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=La+Belle+Aurore&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <script src="wedding-base.js"></script>
  <script src="config-naqsho2.js"></script>
  <script src="wedding-store.js"></script>
  <script src="config-loader.js"></script>
  <style>
    :root {
      --sage: #7d9b76;
      --sage-dark: #5a7354;
      --lavender: #b8a9c9;
      --cream: #f7f4ef;
      --brown: #3d3229;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--brown); }

    /* SPLASH — ubax furma */
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      overscroll-behavior: none;
      transition: opacity 0.8s ease 0.5s, visibility 0.8s ease 0.5s;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .bloom {
      position: relative;
      width: 220px; height: 220px;
      cursor: pointer;
    }
    .bloom-petal {
      position: absolute;
      width: 70px; height: 110px;
      background: linear-gradient(180deg, var(--lavender), var(--sage));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      top: 50%; left: 50%;
      transform-origin: center bottom;
      margin: -55px 0 0 -35px;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
    }
    .bloom-petal:nth-child(1) { transform: rotate(0deg) translateY(-30px); }
    .bloom-petal:nth-child(2) { transform: rotate(60deg) translateY(-30px); }
    .bloom-petal:nth-child(3) { transform: rotate(120deg) translateY(-30px); }
    .bloom-petal:nth-child(4) { transform: rotate(180deg) translateY(-30px); }
    .bloom-petal:nth-child(5) { transform: rotate(240deg) translateY(-30px); }
    .bloom-petal:nth-child(6) { transform: rotate(300deg) translateY(-30px); }

    .splash.opening .bloom-petal {
      transform: rotate(var(--r, 0deg)) translateY(-120px) scale(0.3);
      opacity: 0;
    }
    .splash.opening .bloom-petal:nth-child(1) { --r: 0deg; }
    .splash.opening .bloom-petal:nth-child(2) { --r: 60deg; }
    .splash.opening .bloom-petal:nth-child(3) { --r: 120deg; }
    .splash.opening .bloom-petal:nth-child(4) { --r: 180deg; }
    .splash.opening .bloom-petal:nth-child(5) { --r: 240deg; }
    .splash.opening .bloom-petal:nth-child(6) { --r: 300deg; }

    .bloom-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90px; height: 90px;
      background: #fff;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 8px 30px rgba(125, 155, 118, 0.35);
      z-index: 5;
      transition: transform 0.8s ease, opacity 0.5s;
    }
    .splash.opening .bloom-center { transform: translate(-50%, -50%) scale(2); opacity: 0; }

    #splashInitials {
      font-family: 'La Belle Aurore', cursive;
      font-size: 1.6rem;
      color: var(--sage-dark);
    }

    .splash-text-wrap {
      position: absolute;
      bottom: 18%;
      text-align: center;
      width: 100%;
      padding: 0 1.5rem;
      transition: opacity 0.4s;
    }
    .splash.opening .splash-text-wrap { opacity: 0; }

    #splashSub { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--sage); }
    .splash-names-row {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--brown);
      margin: 0.5rem 0;
    }
    #splashHint { font-size: 0.8rem; color: #999; margin-top: 0.8rem; font-style: italic; }

    .leaf-deco {
      position: absolute;
      font-size: 4rem;
      opacity: 0.08;
      color: var(--sage);
      pointer-events: none;
    }
    .leaf-deco:nth-child(1) { top: 10%; left: 5%; transform: rotate(-30deg); }
    .leaf-deco:nth-child(2) { bottom: 15%; right: 8%; transform: rotate(40deg); }

    .music-control {
      position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 1000;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--sage); color: #fff; border: none; cursor: pointer;
      opacity: 0; pointer-events: none;
    }
    .music-control.show { opacity: 1; pointer-events: auto; }
    .music-control.playing .music-waves { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
    .music-waves span { width: 3px; background: #fff; animation: wv 0.6s ease infinite; }
    .music-control:not(.playing) .music-waves { display: none; }
    @keyframes wv { 50% { transform: scaleY(1.3); } }

    /* HERO — laba dhinac */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }
    .hero-side {
      position: relative;
      min-height: 50vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 3rem 1.5rem;
      overflow: hidden;
    }
    .hero-side-groom { background: var(--sage); }
    .hero-side-bride { background: var(--lavender); }
    .hero-side::before {
      content: '';
      position: absolute; inset: 0;
      background: center/cover no-repeat;
      opacity: 0.35;
    }
  </style>
  <style>
    #heroBg { display: none; }
    .hero-side-groom::before { background-image: var(--groom-bg); }
    .hero-side-bride::before { background-image: var(--bride-bg); }

    .hero-name-big {
      font-family: 'La Belle Aurore', cursive;
      font-size: clamp(3rem, 10vw, 5rem);
      color: #fff;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 15px rgba(0,0,0,0.15);
    }
    .hero-center-band {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 50%;
      width: 200px; height: 200px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.5), 0 20px 50px rgba(0,0,0,0.1);
    }
    #heroSub { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--sage); }
    .hero-ampersand { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--lavender); font-size: 1.5rem; }
    #heroDate { font-family: 'DM Serif Display', serif; font-size: 0.9rem; color: var(--brown); margin-top: 0.3rem; }
    #heroGroom, #heroBride { display: none; }

    .wave-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: var(--cream);
      clip-path: ellipse(55% 100% at 50% 100%);
      z-index: 5;
    }

    .scroll-hint {
      position: absolute; bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--sage-dark);
    }

    /* COUPLE — qaab arch */
    .couple-section {
      padding: 5rem 1.5rem;
      background: #fff;
      max-width: 100%;
    }
    .section-sub { text-align: center; font-size: 0.7rem; letter-spacing: 4px; color: var(--sage); text-transform: uppercase; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 2.5rem; text-align: center; color: var(--brown); margin: 0.5rem 0 3rem; }

    .couple-grid {
      display: flex;
      justify-content: center;
      gap: 4rem;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }
    .couple-card {
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      transition: 0.8s ease;
    }
    .couple-card.visible { opacity: 1; transform: translateY(0); }

    .couple-arch {
      width: 180px; height: 240px;
      border-radius: 90px 90px 0 0;
      overflow: hidden;
      border: 3px solid var(--sage);
      margin: 0 auto 1rem;
      position: relative;
    }
    .couple-arch::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, rgba(125,155,118,0.3));
    }
    .couple-photo { width: 100%; height: 100%; object-fit: cover; }
    .couple-name { font-family: 'La Belle Aurore', cursive; font-size: 2.2rem; color: var(--sage-dark); }
    .couple-role { font-size: 0.65rem; letter-spacing: 3px; color: var(--lavender); text-transform: uppercase; }
    .couple-desc { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 0.95rem; color: #888; max-width: 220px; margin: 0.5rem auto 0; }

    /* GALLERY — polaroid */
    .gallery-section { padding: 4rem 1rem; overflow: hidden; }
    .gallery {
      display: flex;
      gap: 1.5rem;
      padding: 2rem 1rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .gallery::-webkit-scrollbar { height: 6px; }
    .gallery::-webkit-scrollbar-thumb { background: var(--sage); border-radius: 3px; }

    .gallery-item {
      flex: 0 0 260px;
      scroll-snap-align: center;
      opacity: 0;
      transform: rotate(-2deg) translateY(20px);
      transition: 0.6s ease;
    }
    .gallery-item:nth-child(even) { transform: rotate(2deg) translateY(20px); }
    .gallery-item.visible { opacity: 1; transform: rotate(-2deg) translateY(0); }
    .gallery-item:nth-child(even).visible { transform: rotate(3deg) translateY(0); }

    .polaroid {
      background: #fff;
      padding: 12px 12px 40px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .polaroid img { width: 100%; height: 220px; object-fit: cover; display: block; }

    /* LOVE — warqad */
    .love-section {
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      padding: 5rem 1.5rem;
      max-width: 100%;
    }
    .love-section .section-sub, .love-section .section-title { color: rgba(255,255,255,0.8); }
    .love-section .section-title { color: #fff; }

    .love-quote-box {
      max-width: 600px;
      margin: 0 auto;
      background: #fffef8;
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      position: relative;
      opacity: 0;
      transform: scale(0.95);
      transition: 0.8s ease;
      background-image: repeating-linear-gradient(transparent, transparent 27px, #e8e4dc 28px);
      background-size: 100% 28px;
    }
    .love-quote-box.visible { opacity: 1; transform: scale(1); }
    .love-quote-box::before {
      content: '';
      position: absolute;
      left: 24px; top: 0; bottom: 0;
      width: 2px;
      background: #f0c8c8;
    }
    .love-quote-text {
      font-family: 'La Belle Aurore', cursive;
      font-size: 1.5rem;
      line-height: 2.2;
      color: var(--brown);
      padding-left: 1rem;
    }
    .love-sign { font-family: 'DM Serif Display', serif; text-align: right; color: var(--sage-dark); margin-top: 1.5rem; font-size: 1.1rem; }

    /* COUNTDOWN — bar */
    .countdown-section {
      padding: 4rem 1.5rem;
      text-align: center;
      background: var(--cream);
    }
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      max-width: 500px;
      margin: 2rem auto 0;
      border: 2px solid var(--sage);
      border-radius: 8px;
      overflow: hidden;
    }
    .countdown-item {
      padding: 1.5rem 0.5rem;
      border-right: 1px solid var(--sage);
      background: #fff;
    }
    .countdown-item:last-child { border-right: none; }
    .countdown-num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--sage-dark); }
    .countdown-label { font-size: 0.55rem; letter-spacing: 1px; color: var(--lavender); text-transform: uppercase; margin-top: 0.3rem; }

    .venue-section { padding: 4rem 1.5rem; text-align: center; background: #fff; }
    .venue-box {
      max-width: 500px; margin: 0 auto; padding: 2rem;
      border: 2px solid var(--sage); border-radius: 12px; background: var(--cream);
    }
    .venue-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--sage-dark); }
    .venue-detail { color: #666; margin-top: 0.4rem; line-height: 1.7; }
    .venue-btn {
      display: inline-block; margin-top: 1rem; padding: 0.75rem 1.5rem;
      border: 2px solid var(--sage); color: var(--sage-dark); text-decoration: none;
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
    }
    .venue-btn:hover { background: var(--sage); color: #fff; }

    footer {
      padding: 2rem;
      text-align: center;
      background: var(--brown);
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
    }
    footer .footer-names {
      font-family: 'La Belle Aurore', cursive;
      font-size: 2rem;
      color: var(--sage);
      display: block;
    }

    .sparkles, .splash-petals, .petals { display: none; }

    .reveal { opacity: 0; transform: translateY(20px); transition: 0.7s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; }
      .hero-center-band {
        width: 160px; height: 160px;
        padding: 1.2rem;
      }
      .hero-side { min-height: 35vh; }
      .countdown { grid-template-columns: repeat(2, 1fr); }
      .countdown-item:nth-child(2) { border-right: none; }
      .countdown-item { border-bottom: 1px solid var(--sage); }
    }
  </style>
</head>
<body>
  <audio id="weddingMusic" loop preload="auto" playsinline></audio>

  <div class="splash" id="splash">
    <span class="leaf-deco">&#127807;</span>
    <span class="leaf-deco">&#127807;</span>
    <div class="bloom" id="splashCard">
      <div class="bloom-petal"></div>
      <div class="bloom-petal"></div>
      <div class="bloom-petal"></div>
      <div class="bloom-petal"></div>
      <div class="bloom-petal"></div>
      <div class="bloom-petal"></div>
      <div class="bloom-center"><span id="splashInitials">A & A</span></div>
    </div>
    <div class="splash-text-wrap">
      <p id="splashSub"></p>
      <p class="splash-names-row"><span id="splashGroom"></span> &amp; <span id="splashBride"></span></p>
      <p id="splashHint"></p>
    </div>
  </div>

  <button class="music-control" id="musicControl" aria-label="Muusig">
    <span class="music-icon-play">&#9835;</span>
    <span class="music-waves"><span></span><span></span><span></span></span>
  </button>

  <header class="hero" id="heroWrap">
    <div class="hero-side hero-side-groom" id="heroSideGroom">
      <span class="hero-name-big" id="heroGroomDisplay"></span>
    </div>
    <div class="hero-side hero-side-bride" id="heroSideBride">
      <span class="hero-name-big" id="heroBrideDisplay"></span>
    </div>
    <div class="hero-center-band">
      <p id="heroSub"></p>
      <span class="hero-ampersand">&amp;</span>
      <p id="heroDate"></p>
      <p id="heroTime" style="font-size:0.8rem;color:var(--lavender);margin-top:0.25rem"></p>
    </div>
    <div class="wave-bottom"></div>
    <p class="scroll-hint" id="scrollHint"></p>
    <h1 id="heroGroom" style="display:none"></h1>
    <h1 id="heroBride" style="display:none"></h1>
    <div id="heroBg"></div>
  </header>

  <section class="couple-section">
    <p class="section-sub reveal" id="coupleSub"></p>
    <h2 class="section-title reveal" id="coupleTitle"></h2>
    <div class="couple-grid" id="coupleGrid"></div>
  </section>

  <section class="gallery-section">
    <p class="section-sub reveal" id="gallerySub"></p>
    <h2 class="section-title reveal" id="galleryTitle"></h2>
    <div class="gallery" id="gallery"></div>
  </section>

  <section class="love-section">
    <p class="section-sub reveal" id="loveSub"></p>
    <h2 class="section-title reveal" id="loveTitle"></h2>
    <div class="love-quote-box reveal">
      <p class="love-quote-text" id="loveQuote"></p>
      <p class="love-sign" id="loveSign"></p>
    </div>
  </section>

  <section class="countdown-section">
    <p class="section-sub reveal" id="countdownSub"></p>
    <h2 class="section-title reveal" id="countdownTitle"></h2>
    <div class="countdown">
      <div class="countdown-item"><div class="countdown-num" id="days">00</div><div class="countdown-label" id="labelDays"></div></div>
      <div class="countdown-item"><div class="countdown-num" id="hours">00</div><div class="countdown-label" id="labelHours"></div></div>
      <div class="countdown-item"><div class="countdown-num" id="mins">00</div><div class="countdown-label" id="labelMins"></div></div>
      <div class="countdown-item"><div class="countdown-num" id="secs">00</div><div class="countdown-label" id="labelSecs"></div></div>
    </div>
  </section>

  <section class="venue-section">
    <p class="section-sub reveal" id="venueSub"></p>
    <h2 class="section-title reveal" id="venueTitle"></h2>
    <div class="venue-box reveal">
      <p class="venue-name" id="venueName"></p>
      <p class="venue-detail" id="venueAddress"></p>
      <p class="venue-detail" id="venueTime"></p>
      <a class="venue-btn reveal" id="venueBtn" href="#">Khariidadda</a>
    </div>
  </section>

  <footer>
    <span class="footer-names" id="footerNames"></span>
    <p id="footerTag"></p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var cfg = WEDDING_CONFIG;
        var t = cfg.texts;
        var g = cfg.groom.name;
        var b = cfg.bride.name;
        document.documentElement.style.setProperty('--groom-bg', "url('" + cfg.groom.photo + "')");
        document.documentElement.style.setProperty('--bride-bg', "url('" + cfg.bride.photo + "')");
        document.getElementById('heroGroomDisplay').textContent = g;
        document.getElementById('heroBrideDisplay').textContent = b;
        document.getElementById('coupleGrid').dataset.custom = '1';
        document.getElementById('gallery').dataset.custom = '1';
        document.getElementById('coupleGrid').innerHTML =
          '<div class="couple-card"><div class="couple-arch"><img class="couple-photo" src="' + cfg.groom.photo + '" alt="' + g + '" /></div>' +
          '<h3 class="couple-name">' + g + '</h3><p class="couple-role">' + t.groomRole + '</p>' +
          '<p class="couple-desc">"' + cfg.groom.quote + '"</p></div>' +
          '<div class="couple-card"><div class="couple-arch"><img class="couple-photo" src="' + cfg.bride.photo + '" alt="' + b + '" /></div>' +
          '<h3 class="couple-name">' + b + '</h3><p class="couple-role">' + t.brideRole + '</p>' +
          '<p class="couple-desc">"' + cfg.bride.quote + '"</p></div>';
        document.getElementById('gallery').innerHTML = cfg.gallery.map(function(url) {
          return '<div class="gallery-item"><div class="polaroid"><img src="' + url + '" alt="Sawir" /></div></div>';
        }).join('');
        document.querySelectorAll('.couple-card, .gallery-item').forEach(function(el) {
          new IntersectionObserver(function(entries) {
            entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
          }, { threshold: 0.15 }).observe(el);
        });
      }, 100);
    });
  </script>
</body>
</html>
